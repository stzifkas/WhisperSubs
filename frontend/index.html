<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperSubs – Live Captions</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div id="topbar">
    <h1>Whisper<span>Subs</span></h1>

    <label for="audio-source-select" style="font-size:13px;color:#94a3b8;">Source:</label>
    <select id="audio-source-select">
      <option value="mic">Microphone</option>
      <option value="tab" selected>Tab audio</option>
    </select>

    <label for="src-lang-select" style="font-size:13px;color:#94a3b8;">Spoken language:</label>
    <select id="src-lang-select">
      <option value="">Auto-detect</option>
      <option value="ar">Arabic</option>
      <option value="zh">Chinese</option>
      <option value="hr">Croatian</option>
      <option value="cs">Czech</option>
      <option value="da">Danish</option>
      <option value="nl">Dutch</option>
      <option value="en">English</option>
      <option value="fi">Finnish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="el">Greek</option>
      <option value="he">Hebrew</option>
      <option value="hi">Hindi</option>
      <option value="hu">Hungarian</option>
      <option value="id">Indonesian</option>
      <option value="it">Italian</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="no">Norwegian</option>
      <option value="fa">Persian</option>
      <option value="pl">Polish</option>
      <option value="pt">Portuguese</option>
      <option value="ro">Romanian</option>
      <option value="ru">Russian</option>
      <option value="sk">Slovak</option>
      <option value="es">Spanish</option>
      <option value="sv">Swedish</option>
      <option value="tl">Tagalog</option>
      <option value="th">Thai</option>
      <option value="tr">Turkish</option>
      <option value="uk">Ukrainian</option>
      <option value="ur">Urdu</option>
      <option value="vi">Vietnamese</option>
    </select>

    <label for="lang-select" style="font-size:13px;color:#94a3b8;">Translate to:</label>
    <select id="lang-select">
      <option value="">— No translation —</option>
      <option value="Arabic">Arabic</option>
      <option value="Chinese (Simplified)">Chinese (Simplified)</option>
      <option value="Dutch">Dutch</option>
      <option value="English">English</option>
      <option value="French">French</option>
      <option value="German">German</option>
      <option value="Greek">Greek</option>
      <option value="Hindi">Hindi</option>
      <option value="Italian">Italian</option>
      <option value="Japanese">Japanese</option>
      <option value="Korean">Korean</option>
      <option value="Polish">Polish</option>
      <option value="Portuguese">Portuguese</option>
      <option value="Russian">Russian</option>
      <option value="Spanish">Spanish</option>
      <option value="Turkish">Turkish</option>
      <option value="Ukrainian">Ukrainian</option>
    </select>

    <div id="mic-level-wrap">
      <span id="mic-label">AUDIO</span>
      <div id="mic-bar-bg"><div id="mic-bar"></div></div>
    </div>

    <span id="status">Idle</span>

    <button id="start-btn">Start</button>
    <a id="download-btn" class="hidden" download title="Download transcript as SRT">↓ SRT</a>
    <button id="overlay-btn" title="Subtitle overlay">⧉</button>
    <button id="chat-btn" title="Live chat">💬</button>
    <button id="advanced-btn" title="Advanced settings">⚙</button>
  </div>

  <div id="advanced-panel">
    <label>
      Silence duration (ms)
      <span class="knob-hint">(how long silence before a turn ends)</span>
      <div class="knob-row">
        <input type="range" id="silence-threshold" min="200" max="2000" step="50" value="500" />
        <span id="silence-threshold-val">500</span>
      </div>
    </label>
    <label>
      Speech sensitivity
      <span class="knob-hint">(VAD threshold — higher = stricter, ignores more noise)</span>
      <div class="knob-row">
        <input type="range" id="no-speech-threshold" min="0" max="1" step="0.05" value="0.5" />
        <span id="no-speech-threshold-val">0.50</span>
      </div>
    </label>
  </div>

  <div id="main-area">
    <div id="captions-wrap">
      <div id="captions"></div>
    </div>

    <div id="chat-panel">
      <div id="chat-header">Live Chat</div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask about the conversation…" autocomplete="off" />
        <button id="chat-send-btn">Send</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
